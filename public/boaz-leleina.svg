<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="BL monogram with Maasai accents">
  <title>BL — Maasai monogram</title>
  <defs>
    <!-- Maasai shuka stripe fill for the letters -->
    <pattern id="shuka" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(0)">
      <rect width="14" height="14" fill="#B7152B"/>
      <rect y="0" width="14" height="2.5" fill="#0B0B0B"/>
      <rect x="0" width="2.5" height="14" fill="#0B0B0B"/>
    </pattern>
  </defs>

  <!-- Monogram BL -->
  <g font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="260" letter-spacing="-10">
    <text x="200" y="250" text-anchor="middle" fill="url(#shuka)" stroke="#0B0B0B" stroke-width="3" paint-order="stroke">BL</text>
  </g>

  <!-- Maasai beaded collar accent under the letters -->
  <g transform="translate(200,310)">
    <!-- concentric beaded rings -->
    <ellipse rx="120" ry="14" fill="none" stroke="#B7152B" stroke-width="2"/>
    <ellipse rx="105" ry="10" fill="none" stroke="#1E6FB8" stroke-width="2"/>
    <ellipse rx="90"  ry="7"  fill="none" stroke="#F2C200" stroke-width="2"/>
    <!-- bead dots along the outer ring -->
    <g fill="#FFFFFF" stroke="#0B0B0B" stroke-width="1">
      <circle cx="-120" cy="0" r="5"/>
      <circle cx="-96"  cy="-7" r="5" fill="#B7152B"/>
      <circle cx="-72"  cy="-11" r="5" fill="#1E6FB8"/>
      <circle cx="-48"  cy="-13" r="5" fill="#F2C200"/>
      <circle cx="-24"  cy="-14" r="5"/>
      <circle cx="0"    cy="-14" r="5" fill="#B7152B"/>
      <circle cx="24"   cy="-14" r="5" fill="#1E6FB8"/>
      <circle cx="48"   cy="-13" r="5" fill="#F2C200"/>
      <circle cx="72"   cy="-11" r="5"/>
      <circle cx="96"   cy="-7"  r="5" fill="#B7152B"/>
      <circle cx="120"  cy="0"   r="5" fill="#1E6FB8"/>
    </g>
  </g>

  <!-- Two crossed spears underneath as a subtle Maasai mark -->
  <g stroke="#3A2412" stroke-width="3" stroke-linecap="round">
    <line x1="110" y1="360" x2="290" y2="340"/>
    <line x1="110" y1="340" x2="290" y2="360"/>
  </g>
  <g fill="#C9CCD1" stroke="#0B0B0B" stroke-width="1">
    <polygon points="290,340 278,335 282,348"/>
    <polygon points="290,360 282,352 278,365"/>
  </g>
</svg>
